      .logline { fill: none; stroke: #6b7280; stroke-width: 1.5; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .redline { fill: none; stroke: #dc2626; stroke-width: 2.2; marker-end: url(#arrow-red); }
      .purpleline { fill: none; stroke: #7c3aed; stroke-width: 2; marker-end: url(#arrow-purple); }
